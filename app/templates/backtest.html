{% extends "layouts/app.html" %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
        <h1 class="text-2xl md:text-3xl font-bold mb-2">EMA Crossover Backtest</h1>
        <form id="backtest-form" method="post" class="grid grid-cols-1 md:grid-cols-7 gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Fast EMA</label>
                <input name="fast_ema" type="number" value="9"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Slow EMA</label>
                <input name="slow_ema" type="number" value="21"
                    class="w-full rounded-lg border border-slate-300 px-3 py-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Coin</label>
                <select name="coin" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                    <option value="BTC" selected>BTC</option>
                    <option value="ETH">ETH</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Currency</label>
                <select name="currency" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                    <option value="USD" selected>USD</option>
                    <option value="AED" disabled>AED</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Period</label>
                <select name="period" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                    <option value="7d">7 Days</option>
                    <option value="30d" selected>30 Days</option>
                    <option value="60d">60 Days</option>
                    <option value="90d">90 Days</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Interval</label>
                <select name="interval" class="w-full rounded-lg border border-slate-300 px-3 py-2">
                    <option value="15m">15 Minutes</option>
                    <option value="1h" selected>1 Hour</option>
                    <option value="1d">1 Day</option>
                </select>
            </div>

            <button type="submit" id="run-btn"
                class="rounded-lg bg-slate-900 text-white px-4 py-2 font-medium hover:bg-slate-800 disabled:opacity-60">
                Run Backtest
            </button>
        </form>

        <div id="error-box" class="hidden mt-4 rounded-lg bg-red-50 text-red-700 px-4 py-3 text-sm"></div>
    </div>

    <div id="results-card" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-6">
            <div>
            </div>

            <button id="download-btn"
                class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium hover:bg-slate-50">
                Download JSON
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="rounded-xl bg-slate-50 border border-slate-200 p-4">
                <span class="block text-sm text-slate-500 mb-1">Total Return</span>
                <strong id="total-return" class="text-2xl">-</strong>
            </div>

            <div class="rounded-xl bg-slate-50 border border-slate-200 p-4">
                <span class="block text-sm text-slate-500 mb-1">Win Rate</span>
                <strong id="win-rate" class="text-2xl">-</strong>
            </div>

            <div class="rounded-xl bg-slate-50 border border-slate-200 p-4">
                <span class="block text-sm text-slate-500 mb-1">Max Drawdown</span>
                <strong id="max-drawdown" class="text-2xl">-</strong>
            </div>

            <div class="rounded-xl bg-slate-50 border border-slate-200 p-4">
                <span class="block text-sm text-slate-500 mb-1">Trades</span>
                <strong id="number-of-trades" class="text-2xl">-</strong>
            </div>
        </div>

        <h3 class="font-semibold mb-3">Trades</h3>

        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr>
                        <th class="text-start">Entry Time</th>
                        <th class="text-start">Exit Time</th>
                        <th class="text-start">Duration (Hours)</th>
                        <th class="text-start">Entry (USD)</th>
                        <th class="text-start">Exit (USD)</th>
                        <th class="text-start">Profit (USD)</th>
                    </tr>
                </thead>

                <tbody id="trades-body"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
